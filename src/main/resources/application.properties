# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
# We use the ${ENV_VAR:default_value} syntax here. 
# This allows it to run locally on your laptop using "localhost", 
# but easily be overridden by Docker environment variables later as required by the rubric.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expensesplitter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Hibernate configuration to automatically create/update your database tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ===============================
# JWT CONFIGURATION
# ===============================
# The JWT secret must be at least 256 bits (32 characters) long!
jwt.secret=${JWT_SECRET:this-is-a-very-secure-secret-key-for-cpsc-449-expense-api-that-is-long-enough}
# Expiration set to 24 hours (in milliseconds)
jwt.expiration=${JWT_EXPIRATION:86400000}